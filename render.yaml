services:
  - type: web
    name: xoggai-backend
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: xoggai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: xoggai-kv
          type: keyvalue
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: ANTHROPIC_ROUTER_MODEL
        value: claude-sonnet-4-5
      - key: ANTHROPIC_RATING_MODEL
        value: claude-haiku-4-5-20251001
      - key: X402_WALLET_PRIVATE_KEY
        sync: false
      - key: X402_WALLET_ADDRESS
        sync: false
      - key: X402_NETWORK
        value: base-mainnet
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "60"
      - key: STATS_CACHE_TTL
        value: "30"
      - key: SEARCH_CACHE_TTL
        value: "60"
      - key: ALLOW_LIVE_EXECUTION
        value: "false"
      - key: EXECUTION_SIMULATION_ENABLED
        value: "false"
      - key: X402_PREPARE_ENABLED
        value: "false"
      - key: X402_SIGNING_ENABLED
        value: "false"
      - key: MAX_EXECUTION_BUDGET_USDC
        value: "0.05"
  - type: keyvalue
    name: xoggai-kv
    plan: free
    ipAllowList: []

databases:
  - name: xoggai-db
    plan: free
    databaseName: xoggai
    user: xoggai
